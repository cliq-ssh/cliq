email:
  verification:
    subject: "Verify Your Email Address"
    header: "Email Verification Required"
    greeting: "Hello {0},"
    message: "To complete your account registration, you have to enter the verification token below.\nThis token will expire in 24 hours. If you did not register an account, please ignore this email.\n\nYour Verification Token:"
  password_reset:
    subject: "Your Password Reset Request"
    header: "Password Reset"
    greeting: "Hello {0},"
    message: "A password reset was requested for your account.\nThis token will expire in 24 hours. If you did not request this reset, please ignore this email.\n\nYour Request Code:"
  key_rotation:
    subject: "Key Rotation Required"
    header: "Data Encryption Key Rotation"
    greeting: "Hello {0},"
    message: "A key rotation was requested for your account.\nThis code will expire in 30 minutes. If you did not request this rotation, please ignore this email.\n\nYour Rotation Code:"
  common:
    signature: "Thank you"
