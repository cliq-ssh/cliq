name: cliq
description: "cliq: Portable and secure SSH and SFTP client."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0-0"

workspace:
  - packages/cliq_api
  - packages/cliq_term
  - packages/cliq_ui

dependencies:
  flutter:
    sdk: flutter
  cliq_api:
    path: packages/cliq_api
  cliq_term:
    path: packages/cliq_term
  cliq_ui:
    path: packages/cliq_ui
  dartssh2:
    git:
      url: https://github.com/cliq-ssh/dartssh2.git
      ref: master
  lucide_flutter: 1.16.0
  go_router: 17.2.3
  flutter_hooks: 0.21.3+1
  shared_preferences: 2.5.5
  hooks_riverpod: 3.3.1
  riverpod: 3.2.1
  logging: ^1.3.0
  drift: 2.33.0
  drift_flutter: 0.3.0
  path_provider: ^2.1.5
  forui: 0.21.3
  forui_hooks: 0.22.0
  uuid: 4.5.3
  simple_icons:
    git:
      url: https://github.com/jlnrrg/simple_icons.git
      ref: 5e5a86a45ddcaacdb1a785a1593501658e12e9dd
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  file_selector: ^1.1.0
  sodium: ^4.0.2+1
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: 2.33.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: 2.4.7

flutter:
  uses-material-design: true

  fonts:
    - family: SourceCodePro
      fonts:
        - asset: assets/fonts/SourceCodePro-VariableFont_wght.ttf
        - asset: assets/fonts/SourceCodePro-Italic-VariableFont_wght.ttf
          style: italic

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono[wght].ttf
        - asset: assets/fonts/JetBrainsMono-Italic[wght].ttf
          style: italic

