name: cliq
description: "cliq: Portable and secure SSH and SFTP client."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0-0"

workspace:
  - packages/cliq_api
  - packages/cliq_term
  - packages/cliq_ui

dependencies:
  flutter:
    sdk: flutter
  cliq_api:
    path: packages/cliq_api
  cliq_term:
    path: packages/cliq_term
  cliq_ui:
    path: packages/cliq_ui
  dartssh2:
    git:
      url: https://github.com/cliq-ssh/dartssh2.git
      ref: master
  lucide_flutter: 1.23.0
  go_router: 17.3.0
  flutter_hooks: 0.21.3+1
  shared_preferences: 2.5.5
  hooks_riverpod: 3.3.2
  riverpod: 3.3.2
  logging: ^1.3.0
  drift: 2.34.0
  drift_flutter: 0.3.0
  path_provider: ^2.1.6
  forui: 0.23.0
  forui_hooks: 0.23.0
  uuid: 4.6.0
  simple_icons: ^16.23.0
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  file_selector: ^1.1.0
  sodium: ^4.0.3
  pointycastle: ^4.0.0
  window_manager: ^0.5.2
  open_app_file: ^4.0.5
  easy_localization: ^3.0.8
  macos_window_utils: ^1.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: 2.34.0
  build_runner: ^2.15.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: 2.4.8

flutter:
  assets:
    - assets/translations/

  fonts:
    - family: SourceCodePro
      fonts:
        - asset: assets/fonts/SourceCodePro-VariableFont_wght.ttf
        - asset: assets/fonts/SourceCodePro-Italic-VariableFont_wght.ttf
          style: italic

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono[wght].ttf
        - asset: assets/fonts/JetBrainsMono-Italic[wght].ttf
          style: italic

